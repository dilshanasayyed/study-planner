{% extends 'planner/base.html' %}

{% block title %}Login - Study Planner{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="card card-glass" style="margin-top: var(--space-16); max-width: 500px; margin-left: auto; margin-right: auto;">
        <div class="card-header text-center">
            <h1 class="card-title">Welcome Back! 👋</h1>
            <p style="color: var(--neutral-600); margin-top: var(--space-2);">Login to continue your study journey</p>
        </div>
        
        <div class="card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" name="username" id="username" class="form-control" required autofocus>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" name="password" id="password" class="form-control" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: var(--space-4);">
                    Login
                </button>
            </form>
        </div>
        
        <div class="card-footer text-center">
            <p style="margin: 0;">
                Don't have an account? <a href="{% url 'signup' %}" style="font-weight: 600;">Sign up</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
